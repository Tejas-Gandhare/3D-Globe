<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Interactive 3D Globe</title>

<script src="https://unpkg.com/globe.gl"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="searchBox">
<input id="countrySearch" placeholder="Search country..."
onkeyup="if(event.key==='Enter') searchCountry()">
<button onclick="searchCountry()">Search</button>
</div>

<div id="globe"></div>

<div id="infoPanel">
<h2 id="countryName">Country</h2>
<img id="countryFlag" width="120">
<p id="countryInfo"></p>
</div>

<script src="js/app.js"></script>

</body>
</html>
